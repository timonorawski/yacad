name: Performance

on:
  push:
    branches: [main]
  pull_request:
  # Allow manual trigger to re-run benchmarks on demand.
  workflow_dispatch:

jobs:
  bench:
    runs-on: ubuntu-latest
    permissions:
      # Required to write to the step summary (GITHUB_STEP_SUMMARY).
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build (tsc project references)
        run: pnpm build

      - name: Run benchmarks and generate report
        run: node scripts/perf-report.mjs

      - name: Run performance guard tests
        run: pnpm exec vitest run bench

      - name: Upload benchmark JSON artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bench-results
          # The JSON file is written to the OS temp dir by perf-report.mjs;
          # we capture any vitest-bench-*.json files produced in the last run.
          path: /tmp/vitest-bench-*.json
          if-no-files-found: warn
          retention-days: 30
